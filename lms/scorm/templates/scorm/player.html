<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCORM Player - {{ package.title }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            height: 100%;
            overflow: hidden;
            background: #000;
        }
        
        #scorm-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            border: none;
            z-index: 1;
        }
        
        #scorm-frame {
            width: 100%;
            height: 100%;
            border: none;
            background: #fff;
        }
        
        #scorm-loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.9);
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        
        .spinner-border {
            width: 3rem;
            height: 3rem;
        }
        
        /* Hide any potential scrollbars */
        ::-webkit-scrollbar {
            display: none;
        }
        
        body {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body>
    <div id="scorm-loading">
        <div class="spinner-border text-primary" role="status">
            <span class="sr-only">Loading...</span>
        </div>
        <p class="mt-2">Loading SCORM content...</p>
    </div>

    <div id="scorm-container">
        <iframe id="scorm-frame" src="{{ launch_url }}" allowfullscreen></iframe>
    </div>

    <script>
    // Initialize SCORM API
    (function() {
        const attemptId = '{{ attempt.id }}';
        const topicId = '{{ package.topic_id }}';
        const apiEndpoint = '/scorm/api/' + topicId + '/';
        
        console.log('SCORM Player initialized for topic:', topicId);
        console.log('Attempt ID:', attemptId);
        console.log('API Endpoint:', apiEndpoint);
        
        // Hide loading spinner when iframe loads
        document.getElementById('scorm-frame').addEventListener('load', function() {
            document.getElementById('scorm-loading').style.display = 'none';
            console.log('SCORM content loaded');
        });
        
        // Handle window unload to ensure data is saved
        window.addEventListener('beforeunload', function(e) {
            console.log('SCORM player closing, saving data...');
        });
        
        // Handle iframe errors
        document.getElementById('scorm-frame').addEventListener('error', function(e) {
            console.error('SCORM iframe error:', e);
            document.getElementById('scorm-loading').innerHTML = 
                '<div class="alert alert-danger">Error loading SCORM content. Please try refreshing the page.</div>';
        });
    })();
    </script>
</body>
</html>
