{% extends 'base.html' %}
{% load static %}

{% block title %}SCORM Player - {{ package.title }}{% endblock %}

{% block extra_css %}
<style>
    body {
        margin: 0;
        padding: 0;
        overflow: hidden;
    }
    #scorm-container {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        border: none;
    }
    #scorm-frame {
        width: 100%;
        height: 100%;
        border: none;
    }
    #scorm-loading {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
        z-index: 1000;
    }
</style>
{% endblock %}

{% block content %}
<div id="scorm-loading">
    <div class="spinner-border text-primary" role="status">
        <span class="sr-only">Loading...</span>
    </div>
    <p class="mt-2">Loading SCORM content...</p>
</div>

<div id="scorm-container">
    <iframe id="scorm-frame" src="{{ launch_url }}" allowfullscreen></iframe>
</div>

<script src="{% static 'scorm/js/universal-scorm-api.js' %}"></script>
<script>
// Initialize Universal SCORM API
(function() {
    const attemptId = '{{ attempt.id }}';
    const topicId = '{{ package.topic_id }}';
    
    // Initialize the API
    if (window.UniversalSCORMAPI) {
        UniversalSCORMAPI.init(attemptId, topicId);
        UniversalSCORMAPI.exposeAPIs();
        console.log('Universal SCORM API initialized');
    }
    
    // Hide loading spinner when iframe loads
    document.getElementById('scorm-frame').addEventListener('load', function() {
        document.getElementById('scorm-loading').style.display = 'none';
    });
    
    // Handle window unload to ensure data is saved
    window.addEventListener('beforeunload', function(e) {
        if (window.API && window.API.LMSFinish) {
            window.API.LMSFinish('');
        }
        if (window.API_1484_11 && window.API_1484_11.Terminate) {
            window.API_1484_11.Terminate('');
        }
    });
})();
</script>
{% endblock %}
