<!DOCTYPE html>
<html>
<head>
    <title>SCORM API Test - Topic 168</title>
    <style>
        body { font-family: Arial; padding: 20px; max-width: 800px; margin: 0 auto; }
        .test-result { margin: 10px 0; padding: 10px; border-radius: 5px; }
        .success { background: #d4edda; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; border: 1px solid #f5c6cb; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
        #log { background: #f8f9fa; border: 1px solid #dee2e6; padding: 15px; margin-top: 20px; font-family: monospace; font-size: 12px; max-height: 400px; overflow-y: auto; }
        .log-entry { margin: 2px 0; }
    </style>
</head>
<body>
    <h1>🔧 SCORM API Diagnostic Tool</h1>
    <p>Attempt ID: <strong>258</strong> | User: <strong>learner1_branch1_test</strong> | Topic: <strong>168</strong></p>
    
    <h2>API Tests:</h2>
    <button onclick="testInitialize()">1. Test Initialize</button>
    <button onclick="testSetScore()">2. Test Set Score</button>
    <button onclick="testCommit()">3. Test Commit</button>
    <button onclick="testGetValue()">4. Test Get Value</button>
    <button onclick="runFullTest()">▶️ Run Full Test</button>
    <button onclick="clearLog()">🗑️ Clear Log</button>
    
    <div id="results"></div>
    <div id="log"></div>
    
    <script>
        const API_ENDPOINT = '/scorm/api/258/';
        const logDiv = document.getElementById('log');
        const resultsDiv = document.getElementById('results');
        
        function log(message, type = 'info') {
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            const timestamp = new Date().toLocaleTimeString();
            const color = type === 'error' ? 'red' : type === 'success' ? 'green' : 'black';
            entry.innerHTML = `<span style="color: ${color}">[${timestamp}] ${message}</span>`;
            logDiv.appendChild(entry);
            logDiv.scrollTop = logDiv.scrollHeight;
            console.log(message);
        }
        
        function showResult(test, success, message) {
            const div = document.createElement('div');
            div.className = `test-result ${success ? 'success' : 'error'}`;
            div.innerHTML = `<strong>${test}:</strong> ${message}`;
            resultsDiv.appendChild(div);
        }
        
        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }
        
        async function makeApiCall(method, parameters) {
            log(`📤 Sending API call: ${method}(${JSON.stringify(parameters)})`);
            
            try {
                const csrfToken = getCookie('csrftoken');
                log(`🔑 CSRF Token: ${csrfToken ? csrfToken.substring(0, 10) + '...' : 'MISSING!'}`);
                
                const response = await fetch(API_ENDPOINT, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': csrfToken || ''
                    },
                    body: JSON.stringify({
                        method: method,
                        parameters: parameters
                    })
                });
                
                log(`📥 Response status: ${response.status}`);
                const data = await response.json();
                log(`📦 Response data: ${JSON.stringify(data)}`, data.success ? 'success' : 'error');
                
                return data;
            } catch (error) {
                log(`❌ Error: ${error.message}`, 'error');
                throw error;
            }
        }
        
        async function testInitialize() {
            resultsDiv.innerHTML = '';
            log('=== Test 1: Initialize ===');
            try {
                const result = await makeApiCall('LMSInitialize', ['']);
                showResult('Initialize', result.success && result.result === 'true', 
                    result.success ? '✅ Success!' : `❌ Failed: ${result.error}`);
            } catch (error) {
                showResult('Initialize', false, `❌ Error: ${error.message}`);
            }
        }
        
        async function testSetScore() {
            resultsDiv.innerHTML = '';
            log('=== Test 2: Set Score ===');
            try {
                const result = await makeApiCall('LMSSetValue', ['cmi.core.score.raw', '95']);
                showResult('Set Score', result.success && result.result === 'true',
                    result.success ? '✅ Score set to 95!' : `❌ Failed: ${result.error}`);
            } catch (error) {
                showResult('Set Score', false, `❌ Error: ${error.message}`);
            }
        }
        
        async function testCommit() {
            resultsDiv.innerHTML = '';
            log('=== Test 3: Commit ===');
            try {
                const result = await makeApiCall('LMSCommit', ['']);
                showResult('Commit', result.success && result.result === 'true',
                    result.success ? '✅ Data committed!' : `❌ Failed: ${result.error}`);
            } catch (error) {
                showResult('Commit', false, `❌ Error: ${error.message}`);
            }
        }
        
        async function testGetValue() {
            resultsDiv.innerHTML = '';
            log('=== Test 4: Get Value ===');
            try {
                const result = await makeApiCall('LMSGetValue', ['cmi.core.score.raw']);
                showResult('Get Value', result.success, 
                    result.success ? `✅ Score: ${result.result}` : `❌ Failed: ${result.error}`);
            } catch (error) {
                showResult('Get Value', false, `❌ Error: ${error.message}`);
            }
        }
        
        async function runFullTest() {
            resultsDiv.innerHTML = '';
            log('=== Running Full SCORM API Test ===');
            
            try {
                // 1. Initialize
                log('Step 1: Initialize');
                let result = await makeApiCall('LMSInitialize', ['']);
                if (!result.success) throw new Error('Initialize failed');
                
                // 2. Set Score
                log('Step 2: Set Score to 100');
                result = await makeApiCall('LMSSetValue', ['cmi.core.score.raw', '100']);
                if (!result.success) throw new Error('SetValue failed');
                
                // 3. Set Status
                log('Step 3: Set Status to completed');
                result = await makeApiCall('LMSSetValue', ['cmi.core.lesson_status', 'completed']);
                if (!result.success) throw new Error('SetValue (status) failed');
                
                // 4. Commit
                log('Step 4: Commit data');
                result = await makeApiCall('LMSCommit', ['']);
                if (!result.success) throw new Error('Commit failed');
                
                // 5. Verify
                log('Step 5: Verify score');
                result = await makeApiCall('LMSGetValue', ['cmi.core.score.raw']);
                if (!result.success) throw new Error('GetValue failed');
                
                showResult('Full Test', true, `✅ All tests passed! Score: ${result.result}`);
                log('✅ Full test completed successfully!', 'success');
                
            } catch (error) {
                showResult('Full Test', false, `❌ Test failed: ${error.message}`);
                log(`❌ Full test failed: ${error.message}`, 'error');
            }
        }
        
        function clearLog() {
            logDiv.innerHTML = '';
            resultsDiv.innerHTML = '';
        }
        
        // Auto-run a basic test on load
        window.addEventListener('load', () => {
            log('🚀 SCORM API Test Tool loaded');
            log(`📍 API Endpoint: ${API_ENDPOINT}`);
            log(`🌐 Current URL: ${window.location.href}`);
            log('Click a button to run tests');
        });
    </script>
</body>
</html>
