{% extends "scorm_base.html" %}
{% load static %}

{% block title %}Launch SCORM - {{ topic.title }}{% endblock %}

{% block extra_css %}
<style>
    .scorm-container {
        width: 100%;
        height: 100vh;
        border: none;
        background: #f5f5f5;
    }
    
    .scorm-header {
        background: #1c2260;
        color: white;
        padding: 1rem;
        display: flex;
        justify-content: flex-end;
        align-items: center;
    }
    
    .back-to-topic-btn {
        background: rgba(255, 255, 255, 0.2);
        border: 1px solid rgba(255, 255, 255, 0.3);
        color: white;
        padding: 0.5rem 1rem;
        border-radius: 4px;
        cursor: pointer;
        transition: background 0.2s;
        text-decoration: none;
        display: inline-block;
    }
    
    .back-to-topic-btn:hover {
        background: rgba(255, 255, 255, 0.3);
        color: white;
        text-decoration: none;
    }
    
    .scorm-iframe {
        width: 100%;
        height: calc(100vh - 80px);
        border: none;
        background: white;
    }
    
    .scorm-error {
        background: #fee;
        border: 1px solid #fcc;
        color: #c33;
        padding: 1rem;
        margin: 1rem;
        border-radius: 4px;
    }
</style>
{% endblock %}

{% block content %}
<div class="scorm-header">
    <a href="{% url 'courses:topic_view' topic.id %}" class="back-to-topic-btn">Back to Topic</a>
</div>

<div id="scorm-content">
    <iframe 
        id="scorm-iframe" 
        class="scorm-iframe" 
        src="{{ launch_url }}"
        width="100%" 
        height="100vh"
        allowfullscreen="allowfullscreen" 
        mozallowfullscreen="mozallowfullscreen" 
        msallowfullscreen="msallowfullscreen" 
        oallowfullscreen="oallowfullscreen" 
        webkitallowfullscreen="webkitallowfullscreen">
    </iframe>
</div>

<script>
// SCORM data similar to Skillikz pattern
var scorm_data = {
    "student_name": "{{ user.get_full_name|default:user.username }}",
    "student_id": {{ user.id }},
    "suspend_data": "",
    "total_time": "{{ tracking.total_time|default:'PT0S' }}",
    "lesson_location": "{{ tracking.raw_data.cmi.core.lesson_location|default:'' }}",
    "lesson_status": "{{ tracking.completion_status|default:'incomplete' }}",
    "datafromlms": "",
    "score_raw": "{{ tracking.score_raw|default:'' }}",
    "commit_url": "{% url 'scorm:api' topic.id %}",
    "entry": "{{ tracking.raw_data.cmi.core.entry|default:'ab-initio' }}"
};


// Initialize SCORM when page loads
window.onload = function () {
    console.log('SCORM: Page loaded, initializing...');
    
    const iframe = document.getElementById('scorm-iframe');
    
    // Send SCORM data to iframe when ready
    iframe.addEventListener('load', function() {
        console.log('SCORM: Iframe loaded');
        console.log('SCORM: Sending data to iframe');
        iframe.contentWindow.postMessage(scorm_data, '*');
    });
    
    iframe.addEventListener('error', function() {
        console.error('SCORM: Error loading iframe');
    });
    
    // Handle messages from SCORM content
    function receiveMessage(e) {
        // Check origin for security
        if (e.origin !== window.location.origin) {
            return;
        }
        
        if (e.data.launchURL !== window.location.href) {
            return;
        }
        
        console.log('SCORM: Received message from iframe', e.data);
        
        // Handle SCORM data updates
        if (e.data.sendValues) {
            const commitUrl = scorm_data.commit_url;
            
            if ('fetch' in window) {
                const opts = {
                    keepalive: true,
                    method: "POST",
                    body: new URLSearchParams(e.data.sendValues).toString(),
                    headers: {
                        "Content-Type": "application/x-www-form-urlencoded; charset=UTF-8"
                    }
                };
                
                fetch(commitUrl, opts)
                    .then(function(response) {
                        return response.text();
                    })
                    .then(function(response) {
                        updateProgress(response);
                    })
                    .catch(function(err) {
                        console.log('Commit-Fetch error', err);
                    });
            } else {
                // Fallback for older browsers
                const xhr = new XMLHttpRequest();
                xhr.open('POST', commitUrl, false);
                xhr.setRequestHeader('Content-Type', 'application/x-www-form-urlencoded');
                xhr.send(new URLSearchParams(e.data.sendValues).toString());
                updateProgress(xhr.responseText);
            }
        }
    }
    
    window.addEventListener('message', receiveMessage);
};

// Handle page unload - following Skillikz pattern exactly
window.addEventListener('beforeunload', function(){
    const exitUrl = '{% url "scorm:api" topic.id %}';
    const isFirefox = navigator.userAgent.toLowerCase().indexOf('firefox') > -1;
    
    if ('fetch' in window && !isFirefox) {
        fetch(exitUrl, {
            method: 'POST',
            keepalive: true,
            headers: {
                'Content-Type': 'application/x-www-form-urlencoded',
            },
            body: 'action=Terminate&element=cmi.core.exit&value=time-out'
        }).catch(function(err) {
            console.log('Exit-Fetch error', err);
        });
    } else {
        // Fallback for Firefox and older browsers
        const xhr = new XMLHttpRequest();
        xhr.open('POST', exitUrl, false);
        xhr.setRequestHeader('Content-Type', 'application/x-www-form-urlencoded');
        xhr.send('action=Terminate&element=cmi.core.exit&value=time-out');
    }
});

// Update progress function - following Skillikz pattern
function updateProgress(response) {
    console.log('SCORM: Updating progress', response);
    
    try {
        const data = JSON.parse(response);
        
        if (data.unit_status === 'completed') {
            console.log('SCORM: Unit completed');
            // Handle completion logic here
        } else if (data.unit_status === 'incomplete') {
            console.log('SCORM: Unit incomplete');
            // Handle incomplete logic here
        }
    } catch (error) {
        console.error('SCORM: Error parsing progress response', error);
    }
}

</script>
{% endblock %}
