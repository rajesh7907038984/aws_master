<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Profile Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-md mx-auto">
        <h1 class="text-2xl font-bold mb-6">Simple Profile Dropdown Test</h1>
        
        <!-- Simple Profile Dropdown -->
        <div class="flex items-center relative" id="profile-container">
            <button 
                id="profile-button"
                class="w-10 h-10 bg-blue-500 text-white rounded-full hover:bg-blue-600 transition-colors"
                type="button"
            >
                P
            </button>

            <div 
                id="profile-dropdown"
                class="absolute right-0 top-12 w-48 bg-white rounded-lg shadow-lg border hidden"
            >
                <a href="#" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">Profile</a>
                <a href="#" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">Settings</a>
                <a href="#" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">Logout</a>
            </div>
        </div>
        
        <div class="mt-8">
            <h2 class="text-lg font-semibold mb-4">Debug Info:</h2>
            <div id="debug-info" class="bg-white p-4 rounded-lg shadow">
                <p>Button: <span id="button-status">Not found</span></p>
                <p>Dropdown: <span id="dropdown-status">Not found</span></p>
                <p>Container: <span id="container-status">Not found</span></p>
                <p>Clicks: <span id="click-count">0</span></p>
                <p>State: <span id="dropdown-state">closed</span></p>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            console.log('Simple profile test loaded');
            
            const button = document.getElementById('profile-button');
            const dropdown = document.getElementById('profile-dropdown');
            const container = document.getElementById('profile-container');
            
            // Update debug info
            document.getElementById('button-status').textContent = button ? 'Found' : 'Not found';
            document.getElementById('dropdown-status').textContent = dropdown ? 'Found' : 'Not found';
            document.getElementById('container-status').textContent = container ? 'Found' : 'Not found';
            
            let clickCount = 0;
            let isOpen = false;
            
            if (button && dropdown && container) {
                console.log('All elements found');
                
                button.addEventListener('click', function(e) {
                    e.preventDefault();
                    e.stopPropagation();
                    
                    clickCount++;
                    isOpen = !isOpen;
                    
                    document.getElementById('click-count').textContent = clickCount;
                    document.getElementById('dropdown-state').textContent = isOpen ? 'open' : 'closed';
                    
                    console.log('Button clicked, state:', isOpen);
                    
                    if (isOpen) {
                        dropdown.classList.remove('hidden');
                        dropdown.style.display = 'block';
                    } else {
                        dropdown.classList.add('hidden');
                        dropdown.style.display = 'none';
                    }
                });
                
                // Close on outside click
                document.addEventListener('click', function(e) {
                    if (isOpen && !container.contains(e.target)) {
                        isOpen = false;
                        dropdown.classList.add('hidden');
                        dropdown.style.display = 'none';
                        document.getElementById('dropdown-state').textContent = 'closed';
                    }
                });
                
            } else {
                console.error('Elements not found');
            }
        });
    </script>
</body>
</html>
