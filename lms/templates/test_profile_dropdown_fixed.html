<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Dropdown Test - Fixed</title>
    <link href="{% static 'css/tailwind.css' %}" rel="stylesheet">
    <link href="{% static 'css/header-styles.css' %}" rel="stylesheet">
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-md mx-auto">
        <h1 class="text-2xl font-bold mb-6">Profile Dropdown Test - Fixed Version</h1>
        
        <!-- Test Profile Dropdown -->
        <div class="flex items-center relative flex-shrink-0" id="profile-container">
            <button 
                class="relative flex items-center justify-center w-10 h-10 rounded-full hover:bg-gray-100 text-gray-600 hover:text-gray-900 transition-all overflow-hidden flex-shrink-0"
                style="z-index: 60; -webkit-tap-highlight-color: transparent; touch-action: manipulation;"
                aria-label="Profile menu"
                id="profile-button"
                type="button"
                onclick="toggleProfileDropdown()"
            >
                <div class="w-10 h-10 rounded-full bg-gray-300 flex items-center justify-center">
                    <svg class="w-6 h-6 text-gray-600" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd"/>
                    </svg>
                </div>
            </button>

            <!-- Dropdown Menu -->
            <div 
                id="profile-dropdown"
                class="absolute right-0 top-12 w-48 py-2 bg-white rounded-xl shadow-lg ring-1 ring-gray-200 hidden"
                style="z-index: 70;"
            >
                <a href="#" class="flex items-center px-4 py-2 text-sm text-gray-700 hover:bg-gray-100 transition-colors">
                    <svg class="w-4 h-4 mr-3" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                    </svg>
                    View Profile
                </a>
                
                <a href="#" class="flex items-center px-4 py-2 text-sm text-gray-700 hover:bg-gray-100 transition-colors">
                    <svg class="w-4 h-4 mr-3" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
                    </svg>
                    Edit Profile
                </a>
                
                <div class="border-t border-gray-100 my-1"></div>
                
                <button type="button" class="flex items-center w-full px-4 py-2 text-sm text-gray-700 hover:bg-gray-100 transition-colors">
                    <svg class="w-4 h-4 mr-3" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                    </svg>
                    Logout
                </button>
            </div>
        </div>
        
        <div class="mt-8">
            <h2 class="text-lg font-semibold mb-4">Debug Info:</h2>
            <div id="debug-info" class="bg-white p-4 rounded-lg shadow">
                <p>Profile Button: <span id="button-status">Not found</span></p>
                <p>Profile Dropdown: <span id="dropdown-status">Not found</span></p>
                <p>Profile Container: <span id="container-status">Not found</span></p>
                <p>Click Count: <span id="click-count">0</span></p>
                <p>Dropdown Classes: <span id="dropdown-classes">-</span></p>
                <p>Dropdown Style: <span id="dropdown-style">-</span></p>
            </div>
        </div>
        
        <div class="mt-4">
            <button onclick="testDropdown()" class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600">
                Test Dropdown
            </button>
            <button onclick="debugDropdown()" class="bg-green-500 text-white px-4 py-2 rounded hover:bg-green-600 ml-2">
                Debug Info
            </button>
        </div>
    </div>

    <script>
        // Global profile dropdown function - same as in header.html
        window.toggleProfileDropdown = function() {
            const dropdown = document.getElementById('profile-dropdown');
            const container = document.getElementById('profile-container');
            
            if (dropdown && container) {
                const isHidden = dropdown.classList.contains('hidden');
                
                if (isHidden) {
                    // Show dropdown
                    dropdown.classList.remove('hidden');
                    updateDebugInfo();
                    
                    // Close dropdown when clicking outside
                    const closeOnOutsideClick = function(e) {
                        if (!container.contains(e.target)) {
                            dropdown.classList.add('hidden');
                            document.removeEventListener('click', closeOnOutsideClick);
                            updateDebugInfo();
                        }
                    };
                    
                    // Add event listener after a small delay to prevent immediate closure
                    setTimeout(() => {
                        document.addEventListener('click', closeOnOutsideClick);
                    }, 10);
                    
                    // Close on escape key
                    const closeOnEscape = function(e) {
                        if (e.key === 'Escape') {
                            dropdown.classList.add('hidden');
                            document.removeEventListener('keydown', closeOnEscape);
                            document.removeEventListener('click', closeOnOutsideClick);
                            updateDebugInfo();
                        }
                    };
                    
                    document.addEventListener('keydown', closeOnEscape);
                } else {
                    // Hide dropdown
                    dropdown.classList.add('hidden');
                    updateDebugInfo();
                }
            }
        };
        
        function updateDebugInfo() {
            const profileButton = document.getElementById('profile-button');
            const profileDropdown = document.getElementById('profile-dropdown');
            const profileContainer = document.getElementById('profile-container');
            
            document.getElementById('button-status').textContent = profileButton ? 'Found' : 'Not found';
            document.getElementById('dropdown-status').textContent = profileDropdown ? 'Found' : 'Not found';
            document.getElementById('container-status').textContent = profileContainer ? 'Found' : 'Not found';
            
            if (profileDropdown) {
                document.getElementById('dropdown-classes').textContent = profileDropdown.className;
                document.getElementById('dropdown-style').textContent = profileDropdown.style.display || 'default';
            }
        }
        
        function testDropdown() {
            console.log('Testing dropdown...');
            toggleProfileDropdown();
        }
        
        function debugDropdown() {
            updateDebugInfo();
            console.log('Debug info updated');
        }
        
        document.addEventListener('DOMContentLoaded', function() {
            console.log('Profile dropdown test page loaded');
            updateDebugInfo();
        });
    </script>
</body>
</html>
