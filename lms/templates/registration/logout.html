{% extends "base.html" %}
{% load static %}

{% block title %}Logout - {{ block.super }}{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-body text-center">
                    <img src="{% static 'images/nexsy_logo.png' %}" alt="Nexsy LMS Logo" class="mb-4" style="max-height: 60px;">
                    <h2>Logout Confirmation</h2>
                    <p class="text-muted">Are you sure you want to logout from the Nexsy LMS?</p>
                    
                    <form method="post" class="mt-4" id="logout-form">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-danger me-2" id="logout-btn">Yes, Logout</button>
                        <a href="javascript:history.back()" class="btn btn-secondary">Cancel</a>
                    </form>
                    
                    <div class="mt-3">
                        <small class="text-muted">
                            You will be redirected to the login page after logout.
                        </small>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
document.getElementById('logout-form').addEventListener('submit', function(e) {
    const btn = document.getElementById('logout-btn');
    btn.disabled = true;
    btn.textContent = 'Logging out...';
    
    // Disable auto-logout prevention during logout
    if (window.AutoLogoutPrevention) {
        window.AutoLogoutPrevention.destroy();
    }
    
    // Clear any user data
    if (window.UnifiedAuthHandler) {
        window.UnifiedAuthHandler.isAuthenticated = false;
        window.UnifiedAuthHandler.user = null;
    }
});
</script>
{% endblock %}
